  function cookieStorage() {

    const domainAttr = '; domain=.arnisoundtools.com';
    const secureAttr = location.protocol === 'https:' ? '; Secure' : '';
    const CHUNK = 3500;
    const b64e = (s) => btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const b64d = (s) => { s = s.replace(/-/g,'+').replace(/_/g,'/'); while (s.length % 4) s += '='; return decodeURIComponent(escape(atob(s))); };
    const readCookie = (name) => { const esc = name.replace(/([.*+?^${}()|[\]\\])/g,'\\$1'); const m = document.cookie.match('(?:^|; )' + esc + '=([^;]*)'); return m ? m[1] : null; };
    const writeCookie = (name, value, maxAge) => { document.cookie = name + '=' + value + domainAttr + '; path=/; max-age=' + maxAge + '; SameSite=Lax' + secureAttr; };
